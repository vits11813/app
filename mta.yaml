_schema-version: 3.3.0
ID: app
description: A simple CAP project.
version: 1.0.0
modules:
- name: app-srv
  type: nodejs
  path: gen/srv
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: app-destination-content
  type: com.sap.application.content
  requires:
  - name: app-destination-service
    parameters:
      content-target: true
  - name: app_html_repo_host
    parameters:
      service-key:
        name: app_html_repo_host-key
  - name: uaa_app
    parameters:
      service-key:
        name: uaa_app-key
  parameters:
    content:
      instance:
        destinations:
        - Name: MTA_PROJECT_app_html_repo_host
          ServiceInstanceName: app-html5-app-host-service
          ServiceKeyName: app_html_repo_host-key
          sap.cloud.service: MTA_PROJECT
        - Authentication: OAuth2UserTokenExchange
          Name: MTA_PROJECT_uaa_app
          ServiceInstanceName: app-xsuaa-service
          ServiceKeyName: uaa_app-key
          sap.cloud.service: MTA_PROJECT
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: app-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: app_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - project1.zip
      name: project1
      target-path: resources/
- name: project1
  type: html5
  path: project1
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: app-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: app-destination-service
    service-plan: lite
- name: app_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: app-html5-app-host-service
    service-plan: app-host
- name: uaa_app
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: app-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
